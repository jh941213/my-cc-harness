# Python/FastAPI — Untrusted Input 경로 전수 추출
# AI가 검토해야 할 모든 후보군을 추출 (취약점 탐지 아님)
rules:
  - id: py-fastapi-anycall-taint
    languages: [python]
    severity: INFO
    message: "Untrusted input flows into a call"
    mode: taint

    pattern-sources:
      # Path parameters
      - patterns:
          - pattern-inside: |
              @$APP.$METHOD($PATH)
              def $FUNC(..., $PARAM: $TYPE, ...):
                  ...
          - pattern: $PARAM

      # Request body (Pydantic model)
      - patterns:
          - pattern-inside: |
              @$APP.$METHOD($PATH)
              def $FUNC(..., $BODY: $MODEL, ...):
                  ...
          - pattern: $BODY.$FIELD

      # Query parameters
      - patterns:
          - pattern-inside: |
              @$APP.$METHOD($PATH)
              def $FUNC(..., $Q: $TYPE = Query(...), ...):
                  ...
          - pattern: $Q

    pattern-sinks:
      - pattern: $F(...)
      - pattern: $OBJ.$M(...)
